      timeout: 30m

spring:
  profiles:
    active: local   # 기본 프로필 (로컬 환경)

  # 메일 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: minwook8507@gmail.com
    password: ohatzlvaxhambrut
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
